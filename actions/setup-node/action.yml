name: "Setup Node"
description: "Set up Node and install JS dependencies for packages that build front-end assets."

inputs:
  node-version:
    description: "Node version to install."
    required: false
    default: "22"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install JS dependencies
      shell: bash
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
