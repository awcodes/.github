name: CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "config/**"
      - "database/**"
      - "resources/**"
      - "routes/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml*"
      - "phpstan.neon*"
      - "rector.php"
      - "pint.json"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "config/**"
      - "database/**"
      - "resources/**"
      - "routes/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml*"
      - "phpstan.neon*"
      - "rector.php"
      - "pint.json"
      - ".github/workflows/**"

jobs:
  ci:
    uses: awcodes/.github/.github/workflows/laravel-package.yml@v1
    with:
      # Laravel 11 is intentionally omitted from CI (see docs/branch-specific-workflows.md)
      # and is currently blocked by composer security advisories. It stays installable for
      # consumers via testbench ^9.0 in composer.json.
      matrix: |
        [
          {"php":"8.5","laravel":"13.*","testbench":"11.*","dependencies":"prefer-stable"},
          {"php":"8.4","laravel":"13.*","testbench":"11.*","dependencies":"prefer-stable"},
          {"php":"8.5","laravel":"12.*","testbench":"10.*","dependencies":"prefer-stable"},
          {"php":"8.4","laravel":"12.*","testbench":"10.*","dependencies":"prefer-stable"},
          {"php":"8.3","laravel":"12.*","testbench":"10.*","dependencies":"prefer-stable"}
        ]
      run-tests: true
      run-lint: true
      # Flip to true once phpstan-baseline.neon is committed for this package.
      run-static-analysis: false
      run-reformat: true
